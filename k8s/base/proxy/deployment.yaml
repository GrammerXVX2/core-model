apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-proxy
  namespace: core-model
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ollama-proxy
  template:
    metadata:
      labels:
        app: ollama-proxy
    spec:
      containers:
        - name: ollama-proxy
          image: ghcr.io/grammerxvx2/core-model-ollama-proxy:main
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ollama-proxy-env
            - secretRef:
                name: ollama-proxy-secret
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
