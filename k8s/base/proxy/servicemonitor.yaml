apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ollama-proxy
  namespace: core-model
spec:
  selector:
    matchLabels:
      app: ollama-proxy
  namespaceSelector:
    matchNames:
      - core-model
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 5s
