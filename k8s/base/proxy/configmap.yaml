apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-proxy-env
  namespace: core-model
data:
  VLLM_BASE_URLS: http://10.77.166.156:8000/v1
  DEFAULT_RESPONSE_LANGUAGE: ru
  DISABLE_THINKING: "1"
  VLLM_DEFAULT_MAX_TOKENS: "32768"
  VLLM_MAX_TOKENS_CAP: "16384"
  VLLM_MAX_CONTEXT_TOKENS: "10240"
  VLLM_MIN_CONTEXT_HEADROOM: "256"
  CHAT_DEBUG_LOG: "1"
  EMBED_DEBUG_LOG: "1"
  REQUEST_DEBUG_LOG: "1"
  LOG_TEXT_PREVIEW_CHARS: "500"
  UPSTREAM_TIMEOUT_SECONDS: "10"
  UPSTREAM_MAX_CONNECTIONS: "200"
  UPSTREAM_MAX_KEEPALIVE_CONNECTIONS: "50"
  UPSTREAM_KEEPALIVE_EXPIRY_SECONDS: "30"
  UPSTREAM_RETRY_ATTEMPTS: "2"
  UPSTREAM_RETRY_BASE_DELAY_SECONDS: "0.2"
  UPSTREAM_RETRY_JITTER_SECONDS: "0.1"
  MODEL_STATUS_POLL_INTERVAL_SECONDS: "60"
  MODEL_STATUS_POLL_INTERVAL_ERROR_SECONDS: "15"
  MODEL_REGISTRY_ENABLED: "1"
  MODEL_REGISTRY_ROUTING_ENABLED: "1"
  MODEL_REGISTRY_SYNC_FROM_ENV: "0"
  MODEL_REGISTRY_DB_DSN: postgresql://postgres:postgres@postgres:5432/model_registry
