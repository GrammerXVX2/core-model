apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-model-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/GrammerXVX2/core-model.git
    targetRevision: main
    path: k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: core-model
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
