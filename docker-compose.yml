services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${MODEL_REGISTRY_POSTGRES_DB:-model_registry}
      - POSTGRES_USER=${MODEL_REGISTRY_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${MODEL_REGISTRY_POSTGRES_PASSWORD:-postgres}
    ports:
      - "${MODEL_REGISTRY_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MODEL_REGISTRY_POSTGRES_USER:-postgres} -d ${MODEL_REGISTRY_POSTGRES_DB:-model_registry}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - model-registry-pg:/var/lib/postgresql/data

  ollama-proxy:
    build:
      context: ./proxy
    environment:
      - VLLM_BASE_URLS=${VLLM_BASE_URLS:-http://vllm-gpu0:8000/v1}
      - DEFAULT_RESPONSE_LANGUAGE=${DEFAULT_RESPONSE_LANGUAGE:-ru}
      - DISABLE_THINKING=${DISABLE_THINKING:-1}
      - VLLM_DEFAULT_MAX_TOKENS=${VLLM_DEFAULT_MAX_TOKENS:-32768}
      - VLLM_MAX_TOKENS_CAP=${VLLM_MAX_TOKENS_CAP:-16384}
      - VLLM_MAX_CONTEXT_TOKENS=${VLLM_MAX_CONTEXT_TOKENS:-32768}
      - VLLM_MIN_CONTEXT_HEADROOM=${VLLM_MIN_CONTEXT_HEADROOM:-256}
      - TOKEN_CAP_DYNAMIC_MODE=${TOKEN_CAP_DYNAMIC_MODE:-1}
      - TOKEN_BUDGET_STRICT_MODE=${TOKEN_BUDGET_STRICT_MODE:-1}
      - PROXY_PORT=${PROXY_PORT:-11434}
      - UPSTREAM_TIMEOUT_SECONDS=${UPSTREAM_TIMEOUT_SECONDS:-10}
      - UPSTREAM_MAX_CONNECTIONS=${UPSTREAM_MAX_CONNECTIONS:-200}
      - UPSTREAM_MAX_KEEPALIVE_CONNECTIONS=${UPSTREAM_MAX_KEEPALIVE_CONNECTIONS:-50}
      - UPSTREAM_KEEPALIVE_EXPIRY_SECONDS=${UPSTREAM_KEEPALIVE_EXPIRY_SECONDS:-30}
      - UPSTREAM_RETRY_ATTEMPTS=${UPSTREAM_RETRY_ATTEMPTS:-2}
      - UPSTREAM_RETRY_BASE_DELAY_SECONDS=${UPSTREAM_RETRY_BASE_DELAY_SECONDS:-0.2}
      - UPSTREAM_RETRY_JITTER_SECONDS=${UPSTREAM_RETRY_JITTER_SECONDS:-0.1}
      - MODEL_STATUS_POLL_INTERVAL_SECONDS=${MODEL_STATUS_POLL_INTERVAL_SECONDS:-60}
      - MODEL_STATUS_POLL_INTERVAL_ERROR_SECONDS=${MODEL_STATUS_POLL_INTERVAL_ERROR_SECONDS:-15}
      - MODEL_REGISTRY_ENABLED=${MODEL_REGISTRY_ENABLED:-0}
      - MODEL_REGISTRY_ROUTING_ENABLED=${MODEL_REGISTRY_ROUTING_ENABLED:-1}
      - MODEL_REGISTRY_SYNC_FROM_ENV=${MODEL_REGISTRY_SYNC_FROM_ENV:-0}
      - MODEL_REGISTRY_DB_DSN=${MODEL_REGISTRY_DB_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "11434:11434"

volumes:
  model-registry-pg:
