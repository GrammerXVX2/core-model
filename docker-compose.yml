services:
  vllm-gpu0:
    image: vllm/vllm-openai:cu130-nightly
    command:
      - Qwen/Qwen3.5-9B
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "2"
      - --dtype
      - half
      - --max-model-len
      - "12288"
      - --gpu-memory-utilization
      - "0.45"
      - --kv-cache-dtype
      - fp8
      - --disable-custom-all-reduce
      - --swap-space
      - "8"
      - --max-num-seqs
      - "2"
      - --max-num-batched-tokens
      - "2048"
      - --enable-chunked-prefill
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - NVIDIA_VISIBLE_DEVICES=0,1
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    gpus: "all"
    ports:
      - "8001:8000"

  vllm-embed-gpu1:
    image: vllm/vllm-openai:cu130-nightly
    command:
      - ${VLLM_EMBED_MODEL:-Qwen/Qwen3.5-4B}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "2"
      - --runner
      - pooling
      - --dtype
      - half
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.55"
      - --max-num-seqs
      - "2"
      - --max-num-batched-tokens
      - "2048"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_ENABLE_HF_TRANSFER=1
      - NVIDIA_VISIBLE_DEVICES=0,1
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    gpus: "all"
    ports:
      - "8002:8000"

  ollama-proxy:
    build:
      context: ./proxy
    environment:
      - VLLM_BASE_URLS=http://vllm-gpu0:8000/v1
      - VLLM_MODEL=Qwen/Qwen3.5-9B
      - VLLM_EMBED_BASE_URL=http://vllm-embed-gpu1:8000/v1
      - VLLM_EMBED_MODEL=${VLLM_EMBED_MODEL:-Qwen/Qwen3.5-4B}
      - DEFAULT_RESPONSE_LANGUAGE=ru
      - DISABLE_THINKING=1
      - VLLM_DEFAULT_MAX_TOKENS=512
      - VLLM_MAX_TOKENS_CAP=1024
      - VLLM_MAX_CONTEXT_TOKENS=12288
      - VLLM_MIN_CONTEXT_HEADROOM=256
      - PROXY_PORT=11434
    depends_on:
      - vllm-gpu0
      - vllm-embed-gpu1
    ports:
      - "11434:11434"

volumes:
  hf-cache:
